name: Merge NabzClan Into Sidelix

on:
  workflow_dispatch:
  schedule:
    # يفحص كل 15 دقيقة، لكن التنفيذ الحقيقي يصير كل 3 ساعات وربع
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: merge-nabzclan-into-sidelix
  cancel-in-progress: true

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout my repo
        uses: actions/checkout@v4

      - name: Download, normalize, and write all apps to sidelix
        run: |
          set -e

          UPSTREAM_URL="https://apps.nabzclan.vip/repos/altstore.php"

          TARGET_FILE="sidelix"
          TARGET_SOURCE_URL="https://raw.githubusercontent.com/jacckop/source/main/sidelix"

          SYNC_STATE_FILE=".github/sidelix-last-sync"
          SYNC_INTERVAL_SECONDS=$((195 * 60))

          if [ "${{ github.event_name }}" = "schedule" ]; then
            NOW=$(date +%s)

            if [ -f "$SYNC_STATE_FILE" ]; then
              LAST_SYNC=$(cat "$SYNC_STATE_FILE" || echo 0)
            else
              LAST_SYNC=0
            fi

            AGE=$((NOW - LAST_SYNC))

            if [ "$AGE" -lt "$SYNC_INTERVAL_SECONDS" ]; then
              echo "Not time yet. Last sync was $AGE seconds ago."
              exit 0
            fi
          fi

          curl -L --fail --retry 3 --retry-delay 5 \
            --compressed \
            -H "User-Agent: Mozilla/5.0" \
            -H "Accept: application/json,text/plain,*/*" \
            "$UPSTREAM_URL" \
            -o upstream_source.json

          test -s upstream_source.json

          python3 - <<'PY'
          import json
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          UPSTREAM_FILE = Path("upstream_source.json")
          TARGET_FILE = Path("sidelix")

          TARGET_SOURCE_URL = "https://raw.githubusercontent.com/jacckop/source/main/sidelix"
          DEVELOPER_NAME = "iKiraPlus"

          data = json.loads(UPSTREAM_FILE.read_text(encoding="utf-8"))

          if not isinstance(data, dict):
              raise ValueError("Source must be a JSON object")

          apps = data.get("apps", [])

          if not isinstance(apps, list):
              raise ValueError("apps must be a list")

          EXACT_CATEGORY = {
              "instagram": "social",
              "telegram": "social",
              "whatsapp": "social",
              "facebook": "social",
              "messenger": "social",
              "snapchat": "social",
              "discord": "social",
              "threads": "social",
              "tiktok": "social",
              "twitter": "social",
              "x": "social",
              "regram": "social",
              "beegram": "social",
              "locket": "social",
              "bigo": "social",

              "youtube": "entertainment",
              "youtube music": "entertainment",
              "youtubemusic": "entertainment",
              "spotify": "entertainment",
              "netflix": "entertainment",
              "twitch": "entertainment",
              "shahid": "entertainment",
              "anghami": "entertainment",
              "deezer": "entertainment",
              "crunchyroll": "entertainment",
              "cinemana": "entertainment",
              "vodu": "entertainment",
              "hitv": "entertainment",
              "anime cloud": "entertainment",
              "anime slayer": "entertainment",
              "iptv": "entertainment",
              "yacine": "entertainment",
              "yacin": "entertainment",
              "buz tv": "entertainment",
              "rodjo": "entertainment",
              "moviebox": "entertainment",

              "capcut": "photo-video",
              "picsart": "photo-video",
              "remini": "photo-video",
              "inshot": "photo-video",
              "instashot": "photo-video",
              "videostar": "photo-video",
              "video star": "photo-video",
              "nodevideo": "photo-video",
              "lightroom": "photo-video",
              "facetune": "photo-video",
              "vsco": "photo-video",
              "snapseed": "photo-video",
              "photoshop": "photo-video",
              "ps express": "photo-video",
              "psexpress": "photo-video",

              "scanner": "utilities",
              "pdf": "utilities",
              "vpn": "utilities",
              "esign": "utilities",
              "ksign": "utilities",
              "scarlet": "utilities",
              "gbox": "utilities",
              "trollinstaller": "utilities",
              "trollstore": "utilities",
              "filza": "utilities",
              "sideloadly": "utilities",
              "adguard": "utilities",
              "speedtest": "utilities",
              "browser": "utilities",
              "cleaner": "utilities",
              "server": "utilities",

              "chatgpt": "utilities",
              "openai": "utilities",
              "gemini": "utilities",
              "claude": "utilities",
              "copilot": "utilities",
              "perplexity": "utilities",
              "notion": "utilities",

              "duolingo": "utilities",
              "busuu": "utilities",
              "mondly": "utilities",
              "mimo": "utilities",
              "tarteel": "utilities",
              "headway": "utilities",
              "dictionary": "utilities",
              "translator": "utilities",

              "pubg": "games",
              "minecraft": "games",
              "roblox": "games",
              "fortnite": "games",
              "clash": "games",
              "brawl": "games",
              "asphalt": "games",
              "genshin": "games",
              "stumble": "games",
              "gta": "games",
              "rdr": "games",
              "agar": "games",
              "yalla ludo": "games",
              "inside": "games",
              "carx": "games",
              "fifa": "games",
              "efootball": "games",
              "pes": "games",
              "among us": "games",
              "combat master": "games",
              "call of duty": "games",
              "cod": "games",
              "candy crush": "games",
              "block blast": "games",
              "soccer": "games",
              "zombie": "games",
              "tower defense": "games",
              "puzzle": "games",
          }

          VALID_CATEGORIES = {
              "developer",
              "entertainment",
              "games",
              "lifestyle",
              "other",
              "photo-video",
              "social",
              "utilities"
          }

          SOCIAL_WORDS = [
              "social", "chat", "message", "messages", "messaging", "dm", "followers",
              "تواصل", "محادثة", "دردشة", "رسائل", "الخاص", "ستوري", "story",
              "حسابات", "متابعين"
          ]

          ENTERTAINMENT_WORDS = [
              "music", "movie", "movies", "cinema", "video", "videos", "player",
              "stream", "streaming", "iptv", "anime", "tv", "media", "podcast",
              "مسلسلات", "مسلسل", "افلام", "أفلام", "فيلم", "قنوات", "قناة",
              "انمي", "أنمي", "مشاهدة", "ترفيه", "رياضة", "رياضية", "موسيقى",
              "أغاني", "اغاني"
          ]

          PHOTO_VIDEO_WORDS = [
              "photo", "photos", "camera", "video editor", "editor", "edit",
              "filter", "filters", "design", "logo", "image", "images",
              "montage", "مونتاج", "تحرير", "تصميم", "صور", "فيديوهات"
          ]

          TOOLS_WORDS = [
              "vpn", "proxy", "browser", "file", "manager", "scanner", "scan",
              "calculator", "cleaner", "speedtest", "utility", "utilities",
              "tool", "tools", "zip", "unzip", "sign", "installer", "download",
              "downloader", "password", "keyboard", "translate", "maps", "weather",
              "notes", "documents", "pdf", "storage", "backup", "wallpaper",
              "widget", "terminal", "ssh", "server", "calendar", "draw",
              "captions", "أدوات", "توقيع", "مثبت", "تثبيت", "ملفات",
              "تنزيل", "تحميل", "متصفح", "حاسبة", "مترجم"
          ]

          STUDY_AI_WORDS = [
              "study", "student", "school", "college", "university", "learn",
              "learning", "education", "educational", "homework", "math",
              "dictionary", "course", "academy", "artificial intelligence",
              "ai assistant", "ai chatbot", "ai meeting", "ai tutor",
              "ذكاء", "اصطناعي", "دراسة", "تعلم", "تعليم", "مدرسة", "جامعة",
              "واجب", "رياضيات", "قاموس"
          ]

          GAME_WORDS = [
              "game", "games", "gaming", "racing", "chess", "puzzle", "simulator",
              "survival", "battle", "royale", "pokemon", "mod menu", "fps", "pvp",
              "لعبة", "اللعبة", "العاب", "ألعاب", "لاعب", "هاك", "مود",
              "سباق", "قتال", "باتل", "محاكي"
          ]

          def normalize_text(text):
              text = str(text).lower()
              text = re.sub(r"https?://\S+", " ", text)
              text = re.sub(r"[^a-z0-9\u0600-\u06FF]+", " ", text)
              return f" {text} "

          def has_word(text, word):
              word = normalize_text(word).strip()

              if not word:
                  return False

              if " " in word:
                  return f" {word} " in text

              return re.search(rf"(?<![a-z0-9]){re.escape(word)}(?![a-z0-9])", text) is not None

          def has_any(text, words):
              return any(has_word(text, word) for word in words)

          def app_text(app):
              keys = [
                  "name",
                  "bundleID",
                  "bundleIdentifier",
                  "identifier",
                  "localizedDescription",
                  "description",
                  "subtitle",
                  "category",
                  "version",
                  "downloadURL",
                  "down"
              ]

              parts = []
              for key in keys:
                  value = app.get(key)
                  if isinstance(value, str):
                      parts.append(value)

              return normalize_text(" ".join(parts))

          def detect_category(app):
              text = app_text(app)

              for key, category in EXACT_CATEGORY.items():
                  if has_word(text, key):
                      return category

              if has_any(text, GAME_WORDS):
                  return "games"

              if has_any(text, SOCIAL_WORDS):
                  return "social"

              if has_any(text, STUDY_AI_WORDS):
                  return "utilities"

              if has_any(text, ENTERTAINMENT_WORDS):
                  return "entertainment"

              if has_any(text, PHOTO_VIDEO_WORDS):
                  return "photo-video"

              if has_any(text, TOOLS_WORDS):
                  return "utilities"

              return "other"

          def clean_string(value, fallback=""):
              if isinstance(value, str) and value.strip():
                  return value.strip()
              return fallback

          def to_int_size(value):
              if isinstance(value, int):
                  return value

              if isinstance(value, float):
                  return int(value)

              if isinstance(value, str):
                  raw = value.strip().lower().replace(",", "")

                  match = re.search(r"([0-9]+(?:\.[0-9]+)?)\s*(gb|gib|mb|mib|kb|kib|bytes|byte|b)?", raw)
                  if match:
                      number = float(match.group(1))
                      unit = match.group(2) or "bytes"

                      if unit in ["gb", "gib"]:
                          return int(number * 1024 * 1024 * 1024)
                      if unit in ["mb", "mib"]:
                          return int(number * 1024 * 1024)
                      if unit in ["kb", "kib"]:
                          return int(number * 1024)
                      return int(number)

              return 0

          def get_download_url(app):
              for key in ["downloadURL", "down", "url"]:
                  value = app.get(key)
                  if isinstance(value, str) and value.strip():
                      return value.strip()
              return ""

          def get_bundle_id(app, index):
              for key in ["bundleIdentifier", "bundleID", "identifier", "id"]:
                  value = app.get(key)
                  if isinstance(value, str) and value.strip():
                      return value.strip()
              return f"com.jacckop.unknown.{index + 1}"

          def get_icon_url(app):
              for key in ["iconURL", "icon"]:
                  value = app.get(key)
                  if isinstance(value, str) and value.strip():
                      return value.strip()
              return clean_string(data.get("iconURL"), "https://cdn.nabzclan.vip/sidelix/images/logo/logosidelix.jpg")

          def normalize_app(app, index, seen_bundle_ids):
              if not isinstance(app, dict):
                  return None

              name = clean_string(app.get("name"), f"App {index + 1}")

              bundle_id = get_bundle_id(app, index)
              base_bundle_id = bundle_id

              counter = 2
              while bundle_id in seen_bundle_ids:
                  bundle_id = f"{base_bundle_id}.{counter}"
                  counter += 1

              seen_bundle_ids.add(bundle_id)

              version = clean_string(app.get("version"), "1.0")

              date = clean_string(app.get("versionDate"), "")
              if not date:
                  date = clean_string(app.get("date"), "")
              if not date:
                  date = datetime.now(timezone.utc).strftime("%Y-%m-%d")

              download_url = get_download_url(app)
              size = to_int_size(app.get("size", 0))

              subtitle = clean_string(app.get("subtitle"), "")
              description = clean_string(app.get("localizedDescription"), "")
              if not description:
                  description = clean_string(app.get("description"), subtitle)

              category = detect_category(app)
              if category not in VALID_CATEGORIES:
                  category = "other"

              normalized = {
                  "name": name,
                  "bundleIdentifier": bundle_id,
                  "identifier": bundle_id,
                  "developerName": DEVELOPER_NAME,
                  "subtitle": subtitle,
                  "localizedDescription": description,
                  "iconURL": get_icon_url(app),
                  "tintColor": clean_string(app.get("tintColor"), clean_string(data.get("tintColor"), "#F54F32")),
                  "category": category,
                  "versions": [
                      {
                          "version": version,
                          "date": date,
                          "downloadURL": download_url,
                          "size": size
                      }
                  ],
                  "appPermissions": {
                      "entitlements": [],
                      "privacy": []
                  },
                  "patreon": []
              }

              normalized["version"] = version
              normalized["versionDate"] = date
              normalized["downloadURL"] = download_url
              normalized["size"] = size

              return normalized

          seen_bundle_ids = set()
          normalized_apps = []

          for index, app in enumerate(apps):
              normalized = normalize_app(app, index, seen_bundle_ids)
              if normalized:
                  normalized_apps.append(normalized)

          def fixed_featured_apps(apps_list):
              featured = []

              for app in apps_list[:10]:
                  bundle_id = app.get("bundleIdentifier")
                  if isinstance(bundle_id, str) and bundle_id.strip():
                      featured.append(bundle_id.strip())

              return featured

          output = {
              "updated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "name": "Sidelix App Store",
              "identifier": "com.jacckop.source.sidelix",
              "sourceURL": TARGET_SOURCE_URL,
              "iconURL": clean_string(data.get("iconURL"), "https://cdn.nabzclan.vip/sidelix/images/logo/logosidelix.jpg"),
              "website": clean_string(data.get("website"), "https://appstore.sidelix.vip/"),
              "ipawebsite": clean_string(data.get("ipawebsite"), "https://appstore.sidelix.vip/"),
              "apiVersion": clean_string(data.get("apiVersion"), "v1"),
              "subtitle": clean_string(data.get("subtitle"), "Welcome to the repository"),
              "description": clean_string(data.get("description"), "Welcome to the repository"),
              "headerURL": clean_string(data.get("headerURL"), clean_string(data.get("iconURL"), "")),
              "tintColor": clean_string(data.get("tintColor"), "#F54F32"),
              "META": {
                  "repoName": "Sidelix App Store",
                  "repoIcon": clean_string(data.get("iconURL"), "https://cdn.nabzclan.vip/sidelix/images/logo/logosidelix.jpg")
              },
              "featuredApps": fixed_featured_apps(normalized_apps),
              "apps": normalized_apps,
              "news": data.get("news", [])
          }

          TARGET_FILE.write_text(
              json.dumps(output, ensure_ascii=False, indent=4),
              encoding="utf-8"
          )

          print(f"Total upstream apps: {len(apps)}")
          print(f"Total sidelix apps written: {len(normalized_apps)}")
          print(f"Unique bundle IDs: {len(seen_bundle_ids)}")
          print(f"Source URL: {TARGET_SOURCE_URL}")
          PY

          python3 -m json.tool sidelix > /dev/null

          echo "sidelix is valid JSON"

          date +%s > "$SYNC_STATE_FILE"

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- sidelix .github/sidelix-last-sync; then
            echo "No changes found"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add sidelix .github/sidelix-last-sync
            git commit -m "Merge all NabzClan apps into Sidelix"

            git pull --rebase origin main
            git push
          fi

name: Build KiraStore Master Index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/build_master_index.py"
      - ".github/workflows/build-master-index.yml"

permissions:
  contents: write

concurrency:
  group: build-kirastore-master-index
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build KiraStore master source
        run: |
          python scripts/build_master_index.py \
            --output dist/kirastore-index.json

      - name: Check generated source
        run: |
          python -m json.tool dist/kirastore-index.json > /tmp/kirastore-index.check.json

          python - <<'PY'
          import json
          from pathlib import Path
          from collections import Counter

          output_path = Path("dist/kirastore-index.json")
          data = json.loads(output_path.read_text(encoding="utf-8"))

          apps = data.get("apps", [])
          bundles = []
          download_urls = []

          app_size_ok = 0
          app_size_zero = 0
          version_size_ok = 0
          version_size_zero = 0
          mismatch = 0
          missing_version = 0

          for app in apps:
              if not isinstance(app, dict):
                  continue

              bundle = app.get("bundleIdentifier")
              if bundle:
                  bundles.append(bundle)

              versions = app.get("versions", [])
              version = versions[0] if isinstance(versions, list) and versions and isinstance(versions[0], dict) else {}

              if not version.get("version"):
                  missing_version += 1

              url = version.get("downloadURL")
              if isinstance(url, str) and url.strip():
                  download_urls.append(url.strip())

              app_size = app.get("size", 0)
              version_size = version.get("size", 0)

              if isinstance(app_size, int) and app_size > 0:
                  app_size_ok += 1
              else:
                  app_size_zero += 1

              if isinstance(version_size, int) and version_size > 0:
                  version_size_ok += 1
              else:
                  version_size_zero += 1

              if app_size != version_size:
                  mismatch += 1

          duplicate_urls = [url for url, count in Counter(download_urls).items() if count > 1]
          size_mb = output_path.stat().st_size / 1024 / 1024

          print("Apps:", len(apps))
          print("Unique bundle identifiers:", len(set(bundles)), "/", len(bundles))
          print("Download URLs:", len(download_urls))
          print("Unique download URLs:", len(set(download_urls)), "/", len(download_urls))
          print("Duplicate download URLs:", len(duplicate_urls))
          print("Top-level app size > 0:", app_size_ok)
          print("Top-level app size = 0:", app_size_zero)
          print("Version size > 0:", version_size_ok)
          print("Version size = 0:", version_size_zero)
          print("Missing app version:", missing_version)
          print("App size / version size mismatch:", mismatch)
          print("File size:", round(size_mb, 2), "MB")

          if len(set(bundles)) != len(bundles):
              raise SystemExit("Duplicate bundle identifiers still exist")

          if duplicate_urls:
              raise SystemExit("Duplicate download URLs still exist")

          if not apps:
              raise SystemExit("No apps generated")

          if app_size_zero != 0 or version_size_zero != 0:
              raise SystemExit("There are still apps with zero/missing size")

          if mismatch != 0:
              raise SystemExit("App size and version size mismatch exists")

          if missing_version != 0:
              raise SystemExit("Some apps are missing version")
          PY

      - name: Show git changes
        run: |
          git status --short
          git diff --stat dist/kirastore-index.json || true

      - name: Commit generated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cp dist/kirastore-index.json /tmp/kirastore-index.json

          git fetch origin main
          git reset --hard origin/main

          mkdir -p dist
          cp /tmp/kirastore-index.json dist/kirastore-index.json

          git add dist/kirastore-index.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update KiraStore master index"
          git push origin main

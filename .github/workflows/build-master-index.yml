name: Build KiraStore Master Index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/build_master_index.py"
      - ".github/workflows/build-master-index.yml"

permissions:
  contents: write

concurrency:
  group: build-kirastore-master-index
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build KiraStore master source
        run: |
          python scripts/build_master_index.py \
            --output dist/kirastore-index.json

      - name: Validate generated JSON
        run: |
          python -m json.tool dist/kirastore-index.json > /tmp/kirastore-index.check.json

          python - <<'PY'
          import json
          from pathlib import Path

          output_path = Path("dist/kirastore-index.json")
          data = json.loads(output_path.read_text(encoding="utf-8"))

          apps = data.get("apps", [])
          bundles = []

          app_size_ok = 0
          app_size_zero = 0
          version_size_ok = 0
          version_size_zero = 0
          mismatch = 0

          for app in apps:
              if not isinstance(app, dict):
                  continue

              bundle = app.get("bundleIdentifier")
              if bundle:
                  bundles.append(bundle)

              app_size = app.get("size", 0)
              if isinstance(app_size, int) and app_size > 0:
                  app_size_ok += 1
              else:
                  app_size_zero += 1

              versions = app.get("versions", [])
              if isinstance(versions, list) and versions and isinstance(versions[0], dict):
                  vsize = versions[0].get("size", 0)

                  if isinstance(vsize, int) and vsize > 0:
                      version_size_ok += 1
                  else:
                      version_size_zero += 1

                  if app_size != vsize:
                      mismatch += 1

          size_mb = output_path.stat().st_size / 1024 / 1024

          print("Apps:", len(apps))
          print("Unique bundle identifiers:", len(set(bundles)), "/", len(bundles))
          print("Top-level app size > 0:", app_size_ok)
          print("Top-level app size = 0:", app_size_zero)
          print("Version size > 0:", version_size_ok)
          print("Version size = 0:", version_size_zero)
          print("App size / version size mismatch:", mismatch)
          print("File size:", round(size_mb, 2), "MB")

          if len(set(bundles)) != len(bundles):
              raise SystemExit("Duplicate bundle identifiers still exist")

          if not apps:
              raise SystemExit("No apps generated")
          PY

      - name: Commit generated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dist/kirastore-index.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update KiraStore master index"
            git push
          fi

name: Build KiraStore Master Index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/build_master_index.py"
      - ".github/workflows/build-master-index.yml"

permissions:
  contents: write

concurrency:
  group: build-kirastore-master-index
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build KiraStore master source
        run: |
          python scripts/build_master_index.py \
            --output dist/kirastore-index.json

      - name: Validate generated JSON
        run: |
          python -m json.tool dist/kirastore-index.json > /tmp/kirastore-index.check.json

          python - <<'PY'
          import json
          from pathlib import Path

          output_path = Path("dist/kirastore-index.json")
          data = json.loads(output_path.read_text(encoding="utf-8"))

          apps = data.get("apps", [])
          bundles = []

          app_size_ok = 0
          app_size_zero = 0
          version_size_ok = 0
          version_size_zero = 0
          mismatch = 0

          for app in apps:
              if not isinstance(app, dict):
                  continue

              bundle = app.get("bundleIdentifier")
              if bundle:
                  bundles.append(bundle)

              app_size = app.get("size", 0)
              if isinstance(app_size, int) and app_size > 0:
                  app_size_ok += 1
              else:
                  app_size_zero += 1

              versions = app.get("versions", [])
              if isinstance(versions, list) and versions and isinstance(versions[0], dict):
                  version_size = versions[0].get("size", 0)

                  if isinstance(version_size, int) and version_size > 0:
                      version_size_ok += 1
                  else:
                      version_size_zero += 1

                  if app_size != version_size:
                      mismatch += 1

          size_mb = output_path.stat().st_size / 1024 / 1024

          print("Apps:", len(apps))
          print("Unique bundle identifiers:", len(set(bundles)), "/", len(bundles))
          print("Top-level app size > 0:", app_size_ok)
          print("Top-level app size = 0:", app_size_zero)
          print("Version size > 0:", version_size_ok)
          print("Version size = 0:", version_size_zero)
          print("App size / version size mismatch:", mismatch)
          print("File size:", round(size_mb, 2), "MB")

          if len(set(bundles)) != len(bundles):
              raise SystemExit("Duplicate bundle identifiers still exist")

          if not apps:
              raise SystemExit("No apps generated")
          PY

      - name: Check zero-size apps
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from collections import Counter

          path = Path("dist/kirastore-index.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          apps = data.get("apps", [])

          zero_apps = []
          ok_apps = []
          source_counter = Counter()

          for app in apps:
              if not isinstance(app, dict):
                  continue

              versions = app.get("versions", [])
              version = versions[0] if isinstance(versions, list) and versions and isinstance(versions[0], dict) else {}

              app_size = app.get("size", 0)
              version_size = version.get("size", 0)

              app_size_ok = isinstance(app_size, int) and app_size > 0
              version_size_ok = isinstance(version_size, int) and version_size > 0

              source_name = app.get("sourceName") or "Unknown Source"
              source_url = app.get("sourceURL") or "Unknown URL"

              item = {
                  "name": app.get("name"),
                  "bundleIdentifier": app.get("bundleIdentifier"),
                  "appSize": app_size,
                  "versionSize": version_size,
                  "sourceName": source_name,
                  "sourceURL": source_url,
                  "downloadURL": version.get("downloadURL"),
              }

              if app_size_ok and version_size_ok:
                  ok_apps.append(item)
              else:
                  zero_apps.append(item)
                  source_counter[f"{source_name} | {source_url}"] += 1

          print("Total apps:", len(apps))
          print("Apps with valid size:", len(ok_apps))
          print("Apps with zero/missing size:", len(zero_apps))

          print("")
          print("Top sources with zero-size apps:")
          for source, count in source_counter.most_common(30):
              print(count, "|", source)

          print("")
          print("First 100 zero-size apps:")
          for item in zero_apps[:100]:
              print(
                  item["name"],
                  "| appSize:", item["appSize"],
                  "| versionSize:", item["versionSize"],
                  "| bundle:", item["bundleIdentifier"],
                  "| source:", item["sourceName"],
                  "| url:", item["sourceURL"],
              )

          # ملاحظة:
          # ما نخلي الأكشن يفشل حتى يبقى يحدّث ملف السورس.
          # إذا تريد الأكشن يفشل عند وجود أي تطبيق حجمه صفر، فعّل السطرين تحت:
          #
          # if zero_apps:
          #     raise SystemExit("There are apps with zero/missing size")
          PY

      - name: Check mthk sizes
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("dist/kirastore-index.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          apps = data.get("apps", [])

          mthk_apps = []
          with_size = []
          zero_size = []

          for app in apps:
              if not isinstance(app, dict):
                  continue

              source_url = str(app.get("sourceURL", ""))

              if "raw.githubusercontent.com/jacckop/source/main/mthk" not in source_url:
                  continue

              versions = app.get("versions", [])
              version = versions[0] if isinstance(versions, list) and versions and isinstance(versions[0], dict) else {}

              app_size = app.get("size", 0)
              version_size = version.get("size", 0)

              item = {
                  "name": app.get("name"),
                  "bundleIdentifier": app.get("bundleIdentifier"),
                  "appSize": app_size,
                  "versionSize": version_size,
                  "downloadURL": version.get("downloadURL"),
              }

              mthk_apps.append(item)

              if isinstance(app_size, int) and app_size > 0 and isinstance(version_size, int) and version_size > 0:
                  with_size.append(item)
              else:
                  zero_size.append(item)

          print("mthk apps:", len(mthk_apps))
          print("mthk with size:", len(with_size))
          print("mthk zero/missing size:", len(zero_size))

          print("")
          print("First 30 mthk zero-size apps:")
          for item in zero_size[:30]:
              print(
                  item["name"],
                  "| appSize:", item["appSize"],
                  "| versionSize:", item["versionSize"],
                  "| bundle:", item["bundleIdentifier"],
              )

          print("")
          print("First 30 mthk apps with size:")
          for item in with_size[:30]:
              print(
                  item["name"],
                  "| appSize:", item["appSize"],
                  "| versionSize:", item["versionSize"],
                  "| bundle:", item["bundleIdentifier"],
              )
          PY

      - name: Show git changes
        run: |
          git status --short
          git diff --stat dist/kirastore-index.json || true

      - name: Commit generated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dist/kirastore-index.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update KiraStore master index"

          git pull --rebase origin main
          git push origin main

name: Mirror AppTesters Source

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout my repo
        uses: actions/checkout@v4

      - name: Download and customize AppTesters source
        run: |
          set -e

          UPSTREAM_URL="https://raw.githubusercontent.com/apptesters-org/AppTesters_Repo/refs/heads/main/apps.json"
          TARGET_FILE="AppTesters.json"

          curl -L --fail --retry 3 --retry-delay 5 "$UPSTREAM_URL" -o "$TARGET_FILE.new"

          test -s "$TARGET_FILE.new"

          python3 - <<'PY'
          import json
          from pathlib import Path

          TARGET_FILE = Path("AppTesters.json.new")
          DEVELOPER_NAME = "iKiraPlus"

          data = json.loads(TARGET_FILE.read_text(encoding="utf-8"))

          SOCIAL_WORDS = [
              "whatsapp", "telegram", "instagram", "facebook", "messenger", "snapchat",
              "twitter", "x.", "tiktok", "discord", "threads", "wechat", "line",
              "signal", "imo", "viber", "social", "chat", "reddit", "tumblr"
          ]

          ENTERTAINMENT_WORDS = [
              "youtube", "netflix", "spotify", "music", "musixmatch", "soundcloud",
              "twitch", "movie", "movies", "cinema", "video", "player", "stream",
              "iptv", "shahid", "anghami", "deezer", "hulu", "prime video",
              "disney", "crunchyroll", "anime", "tv", "media"
          ]

          TOOLS_WORDS = [
              "vpn", "proxy", "browser", "file", "manager", "scanner", "scan",
              "editor", "photo", "camera", "calculator", "cleaner", "speedtest",
              "utility", "tools", "tool", "zip", "unzip", "sign", "installer",
              "download", "downloader", "password", "keyboard", "translate",
              "maps", "weather", "notes", "documents", "pdf", "storage",
              "backup", "wallpaper", "widget", "terminal", "ssh"
          ]

          STUDY_AI_WORDS = [
              "chatgpt", "gpt", "openai", "ai", "artificial", "intelligence",
              "claude", "gemini", "copilot", "perplexity", "study", "student",
              "school", "college", "university", "learn", "learning", "education",
              "educational", "homework", "math", "dictionary", "duolingo",
              "quizlet", "notion", "anki", "course", "academy"
          ]

          GAME_WORDS = [
              "game", "games", "gaming", "pubg", "minecraft", "roblox", "fortnite",
              "call of duty", "cod", "among us", "subway", "temple run", "clash",
              "brawl", "asphalt", "fifa", "efootball", "pes", "carx", "racing",
              "chess", "puzzle", "simulator", "survival", "battle", "royale",
              "pokemon", "genshin", "stumble", "geometry dash", "mod menu"
          ]

          def is_blank(value):
              return value is None or (isinstance(value, str) and value.strip() == "")

          def app_text(app):
              keys = [
                  "name",
                  "bundleID",
                  "bundleIdentifier",
                  "localizedDescription",
                  "description",
                  "subtitle",
                  "version",
                  "down",
                  "downloadURL",
                  "icon",
                  "iconURL"
              ]

              parts = []
              for key in keys:
                  value = app.get(key)
                  if isinstance(value, str):
                      parts.append(value)

              return " ".join(parts).lower()

          def has_any(text, words):
              return any(word.lower() in text for word in words)

          def detect_category(app):
              text = app_text(app)

              if has_any(text, GAME_WORDS):
                  return "ألعاب"

              if has_any(text, SOCIAL_WORDS):
                  return "تواصل"

              if has_any(text, STUDY_AI_WORDS):
                  return "دراسة وذكاء اصطناعي"

              if has_any(text, ENTERTAINMENT_WORDS):
                  return "ترفيه"

              if has_any(text, TOOLS_WORDS):
                  return "أدوات"

              return "أخرى"

          def looks_like_app(obj):
              if not isinstance(obj, dict):
                  return False

              if "name" not in obj:
                  return False

              app_keys = [
                  "bundleID",
                  "bundleIdentifier",
                  "downloadURL",
                  "down",
                  "version",
                  "icon",
                  "iconURL"
              ]

              return any(key in obj for key in app_keys)

          processed = 0
          developer_filled = 0
          categories_added = 0

          def walk(obj):
              global processed, developer_filled, categories_added

              if isinstance(obj, dict):
                  if looks_like_app(obj):
                      processed += 1

                      if is_blank(obj.get("developerName")):
                          obj["developerName"] = DEVELOPER_NAME
                          developer_filled += 1

                      obj["category"] = detect_category(obj)
                      categories_added += 1

                  for value in obj.values():
                      if isinstance(value, (dict, list)):
                          walk(value)

              elif isinstance(obj, list):
                  for item in obj:
                      walk(item)

          walk(data)

          TARGET_FILE.write_text(
              json.dumps(data, ensure_ascii=False, separators=(",", ":")),
              encoding="utf-8"
          )

          print(f"Processed apps: {processed}")
          print(f"Developer names filled: {developer_filled}")
          print(f"Categories written: {categories_added}")
          PY

          mv "$TARGET_FILE.new" "$TARGET_FILE"

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- AppTesters.json; then
            echo "No changes found"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add AppTesters.json
            git commit -m "Update customized AppTesters source"
            git push
          fi

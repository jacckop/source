name: Mirror DevelEK Source

on:
  workflow_dispatch:
  schedule:
    # GitHub cron ما يدعم كل 7 ساعات ونص مباشرة
    # لذلك نخليه يفحص كل 30 دقيقة، والسكريبت ما يشتغل فعليًا إلا بعد مرور 450 دقيقة
    - cron: "0,30 * * * *"

permissions:
  contents: write

concurrency:
  group: mirror-develek-source
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout my repo
        uses: actions/checkout@v4

      - name: Download and customize DevelEK source
        run: |
          set -e

          UPSTREAM_URL="https://delvek.net/repo.json"
          TARGET_FILE="develek"
          SYNC_STATE_FILE=".github/develek-last-sync"
          SYNC_INTERVAL_SECONDS=$((450 * 60))

          # التشغيل اليدوي يشتغل فورًا
          # التشغيل التلقائي ما يكمل إلا إذا مرّت 7 ساعات ونص
          if [ "${{ github.event_name }}" = "schedule" ]; then
            NOW=$(date +%s)

            if [ -f "$SYNC_STATE_FILE" ]; then
              LAST_SYNC=$(cat "$SYNC_STATE_FILE" || echo 0)
            else
              LAST_SYNC=0
            fi

            AGE=$((NOW - LAST_SYNC))

            if [ "$AGE" -lt "$SYNC_INTERVAL_SECONDS" ]; then
              echo "Not time yet. Last sync was $AGE seconds ago."
              exit 0
            fi
          fi

          curl -L --fail --retry 3 --retry-delay 5 \
            -H "User-Agent: Mozilla/5.0" \
            "$UPSTREAM_URL" \
            -o "$TARGET_FILE.new"

          test -s "$TARGET_FILE.new"

          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          TARGET_FILE = Path("develek.new")

          MY_SOURCE_URL = "https://raw.githubusercontent.com/jacckop/source/main/develek"
          DEVELOPER_NAME = "iKiraPlus"

          data = json.loads(TARGET_FILE.read_text(encoding="utf-8"))

          if isinstance(data, dict):
              data["sourceURL"] = MY_SOURCE_URL

          EXACT_CATEGORY = {
              # تواصل
              "instagram": "تواصل",
              "telegram": "تواصل",
              "whatsapp": "تواصل",
              "facebook": "تواصل",
              "messenger": "تواصل",
              "snapchat": "تواصل",
              "discord": "تواصل",
              "threads": "تواصل",
              "tiktok": "تواصل",
              "twitter": "تواصل",
              "x": "تواصل",
              "regram": "تواصل",
              "beegram": "تواصل",

              # ترفيه
              "youtube": "ترفيه",
              "spotify": "ترفيه",
              "netflix": "ترفيه",
              "twitch": "ترفيه",
              "shahid": "ترفيه",
              "anghami": "ترفيه",
              "deezer": "ترفيه",
              "crunchyroll": "ترفيه",
              "cinemana": "ترفيه",
              "vodu": "ترفيه",
              "hitv": "ترفيه",
              "anime cloud": "ترفيه",
              "anime slayer": "ترفيه",
              "iptv": "ترفيه",

              # أدوات
              "capcut": "أدوات",
              "picsart": "أدوات",
              "remini": "أدوات",
              "inshot": "أدوات",
              "instashot": "أدوات",
              "videostar": "أدوات",
              "video star": "أدوات",
              "nodevideo": "أدوات",
              "ksign": "أدوات",
              "esign": "أدوات",
              "scarlet": "أدوات",
              "gbox": "أدوات",
              "trollinstaller": "أدوات",

              # دراسة وذكاء اصطناعي
              "chatgpt": "دراسة وذكاء اصطناعي",
              "openai": "دراسة وذكاء اصطناعي",
              "gemini": "دراسة وذكاء اصطناعي",
              "claude": "دراسة وذكاء اصطناعي",
              "copilot": "دراسة وذكاء اصطناعي",
              "perplexity": "دراسة وذكاء اصطناعي",
              "notion": "دراسة وذكاء اصطناعي",
              "quizlet": "دراسة وذكاء اصطناعي",
              "duolingo": "دراسة وذكاء اصطناعي",

              # ألعاب
              "pubg": "ألعاب",
              "minecraft": "ألعاب",
              "roblox": "ألعاب",
              "fortnite": "ألعاب",
              "clash": "ألعاب",
              "brawl": "ألعاب",
              "asphalt": "ألعاب",
              "genshin": "ألعاب",
              "stumble": "ألعاب",
              "gta": "ألعاب",
              "rdr": "ألعاب",
              "agar": "ألعاب",
              "yalla ludo": "ألعاب",
              "inside": "ألعاب",
          }

          SOCIAL_WORDS = [
              "social", "chat", "message", "messages", "messaging", "dm", "followers",
              "تواصل", "محادثة", "دردشة", "رسائل", "الخاص", "ستوري", "story"
          ]

          ENTERTAINMENT_WORDS = [
              "music", "movie", "movies", "cinema", "video", "videos", "player",
              "stream", "streaming", "iptv", "anime", "tv", "media", "podcast",
              "مسلسلات", "مسلسل", "افلام", "أفلام", "فيلم", "قنوات", "قناة",
              "انمي", "أنمي", "مشاهدة", "ترفيه", "رياضة", "رياضية", "موسيقى"
          ]

          TOOLS_WORDS = [
              "vpn", "proxy", "browser", "file", "manager", "scanner", "scan",
              "editor", "photo", "camera", "calculator", "cleaner", "speedtest",
              "utility", "utilities", "tool", "tools", "zip", "unzip", "sign",
              "installer", "download", "downloader", "password", "keyboard",
              "translate", "maps", "weather", "notes", "documents", "pdf",
              "storage", "backup", "wallpaper", "widget", "terminal", "ssh",
              "server", "calendar", "draw", "captions", "أدوات", "توقيع",
              "مثبت", "تثبيت", "تصميم", "صور", "فيديوهات", "مونتاج", "تحرير"
          ]

          STUDY_AI_WORDS = [
              "study", "student", "school", "college", "university", "learn",
              "learning", "education", "educational", "homework", "math",
              "dictionary", "course", "academy", "artificial intelligence",
              "ذكاء", "اصطناعي", "دراسة", "تعلم", "تعليم", "مدرسة", "جامعة"
          ]

          GAME_WORDS = [
              "game", "games", "gaming", "racing", "chess", "puzzle", "simulator",
              "survival", "battle", "royale", "pokemon", "mod menu",
              "لعبة", "اللعبة", "العاب", "ألعاب", "لاعب", "هاك", "مود"
          ]

          def normalize(text):
              text = str(text).lower()
              text = re.sub(r"https?://\S+", " ", text)
              text = re.sub(r"[^a-z0-9\u0600-\u06FF]+", " ", text)
              return f" {text} "

          def has_word(text, word):
              word = normalize(word).strip()
              if not word:
                  return False

              if " " in word:
                  return f" {word} " in text

              return re.search(rf"(?<![a-z0-9]){re.escape(word)}(?![a-z0-9])", text) is not None

          def has_any(text, words):
              return any(has_word(text, word) for word in words)

          def app_text(app):
              keys = [
                  "name",
                  "bundleID",
                  "bundleIdentifier",
                  "identifier",
                  "localizedDescription",
                  "description",
                  "subtitle",
                  "category"
              ]

              parts = []
              for key in keys:
                  value = app.get(key)
                  if isinstance(value, str):
                      parts.append(value)

              return normalize(" ".join(parts))

          def detect_category(app):
              text = app_text(app)

              for key, category in EXACT_CATEGORY.items():
                  if has_word(text, key):
                      return category

              if has_any(text, GAME_WORDS):
                  return "ألعاب"

              if has_any(text, SOCIAL_WORDS):
                  return "تواصل"

              if has_any(text, STUDY_AI_WORDS):
                  return "دراسة وذكاء اصطناعي"

              if has_any(text, ENTERTAINMENT_WORDS):
                  return "ترفيه"

              if has_any(text, TOOLS_WORDS):
                  return "أدوات"

              return "أخرى"

          def looks_like_app(obj):
              if not isinstance(obj, dict):
                  return False

              if "name" not in obj:
                  return False

              app_keys = [
                  "bundleID",
                  "bundleIdentifier",
                  "identifier",
                  "downloadURL",
                  "down",
                  "versions",
                  "version"
              ]

              return any(key in obj for key in app_keys)

          processed = 0
          developers_written = 0
          categories_written = 0
          source_urls_fixed = 0

          def walk(obj):
              global processed, developers_written, categories_written, source_urls_fixed

              if isinstance(obj, dict):
                  if "sourceURL" in obj:
                      obj["sourceURL"] = MY_SOURCE_URL
                      source_urls_fixed += 1

                  if looks_like_app(obj):
                      processed += 1

                      obj["developerName"] = DEVELOPER_NAME
                      developers_written += 1

                      for dev_key in ["developer", "artistName", "author", "sellerName"]:
                          if dev_key in obj:
                              obj[dev_key] = DEVELOPER_NAME

                      obj["category"] = detect_category(obj)
                      categories_written += 1

                  for value in obj.values():
                      if isinstance(value, (dict, list)):
                          walk(value)

              elif isinstance(obj, list):
                  for item in obj:
                      walk(item)

          walk(data)

          TARGET_FILE.write_text(
              json.dumps(data, ensure_ascii=False, indent=4),
              encoding="utf-8"
          )

          print(f"Processed apps: {processed}")
          print(f"Developers written: {developers_written}")
          print(f"Categories written: {categories_written}")
          print(f"Source URLs fixed: {source_urls_fixed}")
          PY

          mv "$TARGET_FILE.new" "$TARGET_FILE"

          date +%s > "$SYNC_STATE_FILE"

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- develek .github/develek-last-sync; then
            echo "No changes found"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add develek .github/develek-last-sync
            git commit -m "Update customized DevelEK source"

            git pull --rebase origin main
            git push
          fi
